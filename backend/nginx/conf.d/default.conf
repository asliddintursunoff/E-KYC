gzip on;
gzip_types text/plain application/json application/javascript text/css application/xml;
gzip_min_length 1000;
gzip_comp_level 6;

upstream backend {
    server web_backend:8000;
}

server {
    listen 80;
    server_name api.my-face-info.uz;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name api.my-face-info.uz;

    ssl_certificate /etc/letsencrypt/live/api.my-face-info.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.my-face-info.uz/privkey.pem;

    location ^~ /media/ {
        alias /app/media/;
    }

    location ^~ /static/ {
        alias /app/staticfiles/;
    }

    location /ws/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host api.my-face-info.uz;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location ^~ /api/users/register/selfie/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 100M;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering on;
    }

    location / {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 2M;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering on;
    }
}