name: BUILD-and-DEPLOY AWS

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend/**"
      - "docker-compose.yaml"
      - ".github/workflows/build-push.yaml"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend Image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/ekyc-web-backend:$IMAGE_TAG \
            -f backend/Dockerfile \
            backend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/ekyc-web-backend:$IMAGE_TAG

      - name: Build and Push NGINX Image
        env: 
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Fixed the build context path to point inside the backend folder
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/ekyc-nginx:$IMAGE_TAG \
            -f backend/nginx/Dockerfile \
            backend/nginx
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/ekyc-nginx:$IMAGE_TAG

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Upload docker-compose.yaml
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yaml"
          target: "/home/ubuntu/ekyc"

      - name: Deploy Application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /home/ubuntu/ekyc
            IMAGE_TAG=${{ github.sha }}

            # 1. Clean up aggressive disk space BEFORE pulling new layers
            echo "Cleaning up disk space..."
            docker system prune -a -f --volumes || true

            # Generate local .env
            cat > .env << EOF
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            IMAGE_TAG=$IMAGE_TAG
            DB_HOST=${{ secrets.DB_HOST }}
            DB_PORT=${{ secrets.DB_PORT }}
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            REDIS_HOST=redis_db
            REDIS_PORT=6379
            EOF

            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            # 2. Deploy
            echo "Pulling images and restarting stack..."
            docker compose pull
            docker compose up -d --remove-orphans

            # 3. CRITICAL: Wait and Verify Health
            echo "Waiting for health checks to initialize..."
            sleep 15  # Give containers a brief moment to start up

            # Check if any container is in an exited state or explicitly unhealthy
            UNHEALTHY_COUNT=$(docker compose ps --format json | grep -E '"Status":"(unhealthy|exited)"' | wc -l || echo "0")
            
            if [ "$UNHEALTHY_COUNT" -gt 0 ]; then
              echo "❌ DEPLOYMENT FAILED: One or more containers are unhealthy or crashed!"
              docker compose ps
              docker compose logs --tail=20
              exit 1  # This forces GitHub Actions to mark the deployment as a failure!
            else
              echo "✅ DEPLOYMENT SUCCESSFUL: All containers running smoothly."
            fi

          


