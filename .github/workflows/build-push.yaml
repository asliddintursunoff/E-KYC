name: BUILD-and-DEPLOY AWS

on:
push:
branches:
- main
paths:
- "backend/**"
- "frontend/**"
- "docker-compose.yaml"
- ".github/workflows/build-push.yaml"

jobs:
  build-and-push:
    runs-on: ubuntu-latest


    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/ekyc-web-backend:$IMAGE_TAG \
            -f backend/Dockerfile \
            backend

          docker push ${{ secrets.DOCKERHUB_USERNAME }}/ekyc-web-backend:$IMAGE_TAG

      - name: Build and Push Frontend
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --build-arg VITE_API_BASE_URL=http://3.91.8.141:8000 \
            --build-arg VITE_WS_BASE_URL=ws://3.91.8.141:8000 \
            --build-arg VITE_FACE_FRAME_INTERVAL=1 \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/ekyc-frontend:$IMAGE_TAG \
            -f frontend/Dockerfile \
            frontend

          docker push ${{ secrets.DOCKERHUB_USERNAME }}/ekyc-frontend:$IMAGE_TAG


  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest


    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy Compose File
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yaml"
          target: "/home/ubuntu/ekyc"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            cd /home/ubuntu/ekyc

            IMAGE_TAG="${{ github.sha }}"

            cat > .env <<EOF
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            IMAGE_TAG=$IMAGE_TAG

            DB_HOST=${{ secrets.DB_HOST }}
            DB_PORT=${{ secrets.DB_PORT }}
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}

            REDIS_HOST=redis_db
            REDIS_PORT=6379
            EOF

            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login \
              -u "${{ secrets.DOCKERHUB_USERNAME }}" \
              --password-stdin

            docker compose pull

            docker compose up -d --remove-orphans

            docker image prune -f

