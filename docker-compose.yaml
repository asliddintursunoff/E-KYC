version: '3.8'

services:
  redis_db:
    image: redis:7.2-alpine
    container_name: redis_db
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: always


  web_backend:
    image: ${DOCKERHUB_USERNAME}/ekyc-web-backend:${IMAGE_TAG}
    restart: always
    command: python manage.py runserver 0.0.0.0:8000
    container_name: web_backend
    volumes:
      - media_data:/app/media
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis_db
      - REDIS_PORT=6379
    depends_on:
      redis_db:
        condition: service_healthy
    ports:
      - "8000:8000"

  celery_worker:
    image: ${DOCKERHUB_USERNAME}/ekyc-web-backend:${IMAGE_TAG}
    restart: always
    command: celery -A config worker --loglevel=info
    container_name: celery_worker
    volumes:
      - media_data:/app/media
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis_db
      - REDIS_PORT=6379
    depends_on:
      - web_backend
      - redis_db

  frontend:
    image: ${DOCKERHUB_USERNAME}/ekyc-frontend:${IMAGE_TAG}
    container_name: faceid_frontend
    restart: always
    ports:
      - "80:5173"
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL}
      - VITE_WS_BASE_URL=${VITE_WS_BASE_URL}
      - VITE_FACE_FRAME_INTERVAL=${VITE_FACE_FRAME_INTERVAL}
    depends_on:
      - web_backend

volumes:
  redis_data:
  media_data: