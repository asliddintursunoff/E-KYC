version: '3.8'

services:
  redis_db:
    image: redis:7.2-alpine
    container_name: redis_db
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: always

  web_backend:
    image: ${DOCKERHUB_USERNAME}/ekyc-web-backend:${IMAGE_TAG}
    restart: always
    command: daphne -b 0.0.0.0 -p 8000 config.asgi:application
    container_name: web_backend
    ports:
      - "8000:8000"
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis_db
      - REDIS_PORT=6379
    
    healthcheck:
      test: ["CMD","curl", "http://localhost:8000/api/health/"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 60s
    depends_on:
      redis_db:
        condition: service_healthy

  celery_worker:
    image: ${DOCKERHUB_USERNAME}/ekyc-web-backend:${IMAGE_TAG}
    container_name: celery_worker
    restart: always
    command: celery -A config worker --loglevel=warning --concurrency=2 --max-tasks-per-child=500
    volumes:
      - media_data:/app/media
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis_db
      - REDIS_PORT=6379
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      redis_db:
        condition: service_healthy
      web_backend:
        condition: service_healthy
      

  nginx:
    image: ${DOCKERHUB_USERNAME}/ekyc-nginx:${IMAGE_TAG}
    container_name: nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    depends_on:
      web_backend:
        condition: service_healthy
      celery_worker:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: "true" 


volumes:
  redis_data:
  media_data:
  static_data:
  certbot_certs:
  certbot_www: