version: '5.3'
services:
  postgres_db:
    image: pgvector/pgvector:pg17
    container_name: postgres_pgvector
    # restart: always
    
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
    ports:
      - "5433:5432"

    volumes:
      - postgres_data_v:/var/lib/postgresql/data

  redis_db:
    image: redis:7.2-alpine
    container_name: redis_db
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data


  # frontend:
  #   build:
  #     context: ./frontend
  #   container_name: e_kyc_frontend
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     HOST: 0.0.0.0
  #     PORT: 3000
  #     BACKEND_ORIGIN: http://host.docker.internal:8000
  #   extra_hosts:
  #     - "host.docker.internal:host-gateway"

volumes:
  postgres_data_v:
  redis_data:
